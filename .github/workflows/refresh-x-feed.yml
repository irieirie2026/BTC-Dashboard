name: Refresh X feed cache

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Refresh bundled X feed
        run: python3 scripts/refresh_x_feed.py

      - name: Commit cache update
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/x-feed-cache.json
          if git diff --staged --quiet; then
            echo "No cache changes to commit."
            exit 0
          fi
          git commit -m "Refresh X feed cache [automated]"
          git push